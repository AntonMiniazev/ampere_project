name: ampere_duckdb_project
version: 2.0.0
config-version: 2
profile: ampere_duckdb_project

model-paths: ["models"]
macro-paths: ["macros"]
test-paths: ["tests"]
clean-targets: ["target"]

vars:
  bronze_source_name: "bronze"
  bronze_source_schema: "bronze"
  bronze_source_mapping_path: "dbt/.dbt_local/bronze_source_mapping.json"
  bronze_source_mapping_max_age_hours: 24

on-run-start:
  - "{{ ampere_prepare_bronze_sources() }}"

models:
  ampere_duckdb_project:
    +persist_docs:
      relation: true
      columns: true
    staging:
      +materialized: view
      +schema: silver_staging
      +tags: ["silver", "staging"]
    intermediate:
      +materialized: view
      +schema: silver_intermediate
      +tags: ["silver", "intermediate"]
    marts:
      dimensions:
        +materialized: table
        +schema: silver
        +tags: ["silver", "dimension", "publish"]
      facts:
        +materialized: table
        +schema: silver
        +tags: ["silver", "fact", "publish"]
