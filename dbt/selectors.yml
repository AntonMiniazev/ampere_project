selectors:
  - name: silver_source_freshness
    description: Bronze sources used by the silver dbt project.
    definition:
      method: source
      value: bronze.*

  - name: silver_staging
    description: Bronze-to-staging models that mirror the business table set.
    definition:
      method: tag
      value: staging

  - name: silver_dimensions_facts
    description: Intermediate plus curated silver dimensions and facts.
    definition:
      union:
        - method: tag
          value: intermediate
        - method: tag
          value: dimension
        - method: tag
          value: fact

  - name: silver_publishable
    description: Curated silver tables intended for UC registration and publish.
    definition:
      method: tag
      value: publish
