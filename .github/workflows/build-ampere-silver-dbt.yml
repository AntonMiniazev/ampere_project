name: Build ampere-silver-dbt image

on:
  push:
    branches:
      - master
      - main
    paths:
      - "dbt/**"
      - "docker/silver_dbt/**"
      - "docker/image_tags.json"
      - ".github/workflows/build-ampere-silver-dbt.yml"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate silver dbt project
        run: |
          test -f dbt/dbt_project.yml || {
            echo "Missing dbt/dbt_project.yml. The silver image is built from repo root and requires the dbt project." >&2
            exit 1
          }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read image tag
        id: tag
        env:
          MANUAL_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          tag="$MANUAL_IMAGE_TAG"
          if [ -z "$tag" ]; then
            tag=$(jq -r '.silver_dbt' docker/image_tags.json)
          fi
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "Missing silver_dbt tag in docker/image_tags.json" >&2
            exit 1
          fi
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ampere-silver-dbt
          tags: |
            type=sha
            type=raw,value=latest
            type=ref,event=tag
            type=raw,value=${{ steps.tag.outputs.image_tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/silver_dbt/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
