name: Release image versions

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.5.1"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.plan.outputs.release_tag }}
      previous_tag: ${{ steps.plan.outputs.previous_tag }}
      previous_tags: ${{ steps.plan.outputs.previous_tags }}
      changed_matrix: ${{ steps.plan.outputs.changed_matrix }}
      unchanged_matrix: ${{ steps.plan.outputs.unchanged_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build release plan
        id: plan
        shell: bash
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python <<'PY'
          import json
          import os
          import re
          import subprocess


          def semver_tuple(tag: str) -> tuple[int, int, int] | None:
              match = re.fullmatch(r"v(\d+)\.(\d+)\.(\d+)", tag)
              if not match:
                  return None
              return tuple(int(part) for part in match.groups())


          release_tag = os.environ.get("INPUT_RELEASE_TAG") or os.environ["GITHUB_REF_NAME"]
          release_version = semver_tuple(release_tag)
          if release_version is None:
              raise SystemExit(
                  f"Release tag must be numeric semver like v0.2.6, got {release_tag!r}"
              )
          configs = [
              {
                  "image": "ampere-spark",
                  "context": "docker/spark/raw_etl",
                  "file": "docker/spark/raw_etl/Dockerfile",
                  "paths": [
                      "docker/spark/raw_etl/",
                  ],
              },
              {
                  "image": "ampere-dbt",
                  "context": ".",
                  "file": "docker/dbt/Dockerfile",
                  "paths": [
                      "dbt/",
                      "docker/dbt/",
                  ],
              },
              {
                  "image": "init-source-preparation",
                  "context": "docker/init_source_preparation",
                  "file": "docker/init_source_preparation/Dockerfile",
                  "paths": [
                      "docker/init_source_preparation/",
                  ],
              },
              {
                  "image": "order-data-generator",
                  "context": "docker/order_data_generator",
                  "file": "docker/order_data_generator/Dockerfile",
                  "paths": [
                      "docker/order_data_generator/",
                  ],
              },
          ]

          tags = subprocess.check_output(
              ["git", "tag"],
              text=True,
          ).splitlines()
          tag_names = set(tags)
          previous_candidates = [
              (version, tag)
              for tag in tags
              if (version := semver_tuple(tag)) is not None and version < release_version
          ]
          previous_tag = max(previous_candidates, default=(None, ""))[1]
          previous_tags = [
              tag
              for _version, tag in sorted(previous_candidates, reverse=True)
          ]

          changed = []
          unchanged = []

          if previous_tag:
              diff_head = release_tag if release_tag in tag_names else "HEAD"
              diff_output = subprocess.check_output(
                  ["git", "diff", "--name-only", f"{previous_tag}..{diff_head}"],
                  text=True,
              )
              changed_files = [line.strip() for line in diff_output.splitlines() if line.strip()]
          else:
              changed_files = []

          for config in configs:
              if not previous_tag:
                  changed.append(config)
                  continue

              is_changed = any(
                  any(
                      path == prefix.rstrip("/") or path.startswith(prefix)
                      for prefix in config["paths"]
                  )
                  for path in changed_files
              )
              (changed if is_changed else unchanged).append(config)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"release_tag={release_tag}\n")
              fh.write(f"previous_tag={previous_tag}\n")
              fh.write(f"previous_tags={json.dumps(previous_tags, separators=(',', ':'))}\n")
              fh.write(f"changed_matrix={json.dumps(changed, separators=(',', ':'))}\n")
              fh.write(f"unchanged_matrix={json.dumps(unchanged, separators=(',', ':'))}\n")
          PY

  build-changed:
    needs: plan
    if: ${{ needs.plan.outputs.changed_matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.changed_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize registry owner
        id: owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Validate dbt project
        if: ${{ matrix.image == 'ampere-dbt' }}
        run: |
          test -f dbt/dbt_project.yml || {
            echo "Missing dbt/dbt_project.yml. The shared dbt image is built from repo root and requires the dbt project." >&2
            exit 1
          }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image }}:${{ needs.plan.outputs.release_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  retag-unchanged:
    needs: plan
    if: ${{ needs.plan.outputs.unchanged_matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.unchanged_matrix) }}
    steps:
      - name: Normalize registry owner
        id: owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Copy existing image digest to release tag
        shell: bash
        env:
          OWNER: ${{ steps.owner.outputs.value }}
          IMAGE: ${{ matrix.image }}
          RELEASE_TAG: ${{ needs.plan.outputs.release_tag }}
          PREVIOUS_TAGS: ${{ needs.plan.outputs.previous_tags }}
        run: |
          TARGET_REF="ghcr.io/${OWNER}/${IMAGE}:${RELEASE_TAG}"
          mapfile -t SOURCE_TAGS < <(
            python - <<'PY'
          import json
          import os

          for tag in json.loads(os.environ.get("PREVIOUS_TAGS") or "[]"):
              print(tag)
          PY
          )

          for SOURCE_TAG in "${SOURCE_TAGS[@]}"; do
            SOURCE_REF="ghcr.io/${OWNER}/${IMAGE}:${SOURCE_TAG}"
            if docker buildx imagetools inspect "${SOURCE_REF}" >/dev/null 2>&1; then
              docker buildx imagetools create --tag "${TARGET_REF}" "${SOURCE_REF}"
              docker buildx imagetools inspect "${TARGET_REF}"
              exit 0
            fi
            echo "Source image ${SOURCE_REF} does not exist or is not readable; trying older release tag."
          done

          echo "No existing source image found for ghcr.io/${OWNER}/${IMAGE} in previous release tags." >&2
          exit 1
