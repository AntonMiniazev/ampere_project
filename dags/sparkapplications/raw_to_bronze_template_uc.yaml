apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: raw-to-bronze-uc-{{ params.stream }}-{{ ts_nodash }}
  namespace: {{ params.namespace }}
spec:
  type: Python
  mode: cluster
  sparkVersion: "4.0.1"
  image: {{ params.image }}
  imagePullPolicy: {{ params.image_pull_policy }}
  imagePullSecrets:
    - ghcr-pull
  mainApplicationFile: local:///opt/spark/app/raw_to_bronze_etl_uc.py
  arguments:
    # Airflow renders these arguments first, then the Spark image receives them
    # as CLI inputs for raw_to_bronze_etl_uc.py.
    - --tables
    - "{{ params.tables }}"
    - --table-config
    - '{{ params.table_config | tojson }}'
    - --groups-config
    - '{{ params.groups_config | tojson }}'
    - --schema
    - {{ params.schema }}
    - --run-date
    - "{{ (dag_run.logical_date or dag_run.run_after).strftime('%Y-%m-%d') }}"
    - --mode
    - "{{ params.mode }}"
    - --partition-key
    - "{{ params.partition_key }}"
    - --event-date-column
    - "{{ params.event_date_column }}"
    - --lookback-days
    - "{{ params.lookback_days }}"
    - --raw-bucket
    - {{ params.raw_bucket }}
    - --raw-prefix
    - {{ params.raw_prefix }}
    - --source-system
    - {{ params.source_system }}
    - --uc-enabled
    - "{{ params.uc_enabled }}"
    - --uc-catalog
    - "{{ params.uc_catalog }}"
    - --uc-bronze-schema
    - "{{ params.uc_bronze_schema }}"
    - --uc-ops-schema
    - "{{ params.uc_ops_schema }}"
    - --app-name
    - {{ params.app_name }}
    - --image
    - {{ params.image }}
  sparkConf:
    # Bronze jobs need Delta + UC + object-storage libraries, but they should
    # not prepend the whole Ivy cache to the classpath. Pin the small set of
    # jars we rely on so Spark 4.0.1 keeps using its matching Hadoop runtime.
    spark.jars: "local:///opt/spark/ivy/jars/org.apache.hadoop_hadoop-aws-3.4.1.jar,local:///opt/spark/ivy/jars/software.amazon.awssdk_bundle-2.24.6.jar,local:///opt/spark/ivy/delta-spark_2.13-4.0.1.jar,local:///opt/spark/ivy/delta-storage-4.0.1.jar,local:///opt/spark/ivy/unitycatalog-spark_2.13-0.3.1.jar,local:///opt/spark/ivy/unitycatalog-client-0.3.1.jar"
    spark.ui.enabled: "false"
    spark.sql.extensions: "io.delta.sql.DeltaSparkSessionExtension"
    spark.sql.catalog.spark_catalog: "org.apache.spark.sql.delta.catalog.DeltaCatalog"
    spark.sql.shuffle.partitions: "{{ params.shuffle_partitions }}"
    spark.default.parallelism: "{{ params.shuffle_partitions }}"
    spark.sql.adaptive.enabled: "true"
    spark.sql.adaptive.coalescePartitions.enabled: "true"
    spark.kubernetes.driver.memoryOverhead: "{{ params.driver_memory_overhead }}"
    spark.kubernetes.executor.memoryOverhead: "{{ params.executor_memory_overhead }}"
    spark.hadoop.fs.s3a.endpoint: "{{ params.minio_endpoint }}"
    spark.hadoop.fs.s3a.path.style.access: "true"
    spark.hadoop.fs.s3a.connection.ssl.enabled: "{{ params.minio_ssl_enabled }}"
    spark.hadoop.fs.s3a.impl: "org.apache.hadoop.fs.s3a.S3AFileSystem"
    spark.hadoop.fs.s3a.aws.credentials.provider: "org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider"
    spark.hadoop.fs.s3.endpoint: "{{ params.minio_endpoint }}"
    spark.hadoop.fs.s3.path.style.access: "true"
    spark.hadoop.fs.s3.connection.ssl.enabled: "{{ params.minio_ssl_enabled }}"
    spark.hadoop.fs.s3.impl: "org.apache.hadoop.fs.s3a.S3AFileSystem"
    spark.hadoop.fs.AbstractFileSystem.s3.impl: "org.apache.hadoop.fs.s3a.S3A"
{% if params.uc_enabled == "true" %}
    spark.sql.catalog.{{ params.uc_catalog }}: "{{ params.uc_catalog_impl }}"
    spark.sql.catalog.{{ params.uc_catalog }}.uri: "{{ params.uc_api_uri }}"
    spark.sql.defaultCatalog: "{{ params.uc_catalog }}"
    spark.sql.catalog.{{ params.uc_catalog }}.auth.type: "{{ params.uc_auth_type }}"
    spark.sql.catalog.{{ params.uc_catalog }}.auth.token: "{{ params.uc_token }}"
{% endif %}
  volumes:
    - name: ivy-cache
      persistentVolumeClaim:
        claimName: ivy-cache
  restartPolicy:
    type: Never
  driver:
    # The driver coordinates manifest discovery, registry checks, and Delta writes.
    cores: {{ params.driver_cores }}
    coreRequest: "{{ params.driver_core_request }}"
    memory: "{{ params.driver_memory }}"
    serviceAccount: {{ params.service_account }}
    nodeSelector:
      kubernetes.io/hostname: ampere-k8s-node4
    volumeMounts:
      - name: ivy-cache
        mountPath: /opt/spark/ivy
    env:
      - name: MINIO_S3_ENDPOINT
        value: "{{ params.minio_endpoint }}"
      - name: MINIO_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: minio-creds
            key: MINIO_ACCESS_KEY
      - name: MINIO_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: minio-creds
            key: MINIO_SECRET_KEY
  executor:
    # Executors perform the distributed reads, unions, and merge/overwrite work.
    instances: {{ params.executor_instances }}
    cores: {{ params.executor_cores }}
    coreRequest: "{{ params.executor_core_request }}"
    memory: "{{ params.executor_memory }}"
{% if params.executor_node_selector %}
    nodeSelector:
      kubernetes.io/hostname: {{ params.executor_node_selector }}
{% endif %}
    volumeMounts:
      - name: ivy-cache
        mountPath: /opt/spark/ivy
    env:
      - name: MINIO_S3_ENDPOINT
        value: "{{ params.minio_endpoint }}"
      - name: MINIO_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: minio-creds
            key: MINIO_ACCESS_KEY
      - name: MINIO_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: minio-creds
            key: MINIO_SECRET_KEY
