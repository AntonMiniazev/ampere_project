apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: bronze-registry-init-uc-{{ ts_nodash }}
  namespace: {{ params.namespace }}
spec:
  type: Python
  mode: cluster
  sparkVersion: "4.0.1"
  image: {{ params.image }}
  imagePullPolicy: {{ params.image_pull_policy }}
  imagePullSecrets:
    - ghcr-pull
  mainApplicationFile: local:///opt/spark/app/bronze_registry_init_uc.py
  arguments:
    # These CLI arguments are rendered by Airflow and then consumed by
    # bronze_registry_init_uc.py inside the Spark image.
    - --uc-enabled
    - "{{ params.uc_enabled }}"
    - --uc-catalog
    - "{{ params.uc_catalog }}"
    - --uc-ops-schema
    - "{{ params.uc_ops_schema }}"
    - --app-name
    - {{ params.app_name }}
  sparkConf:
    # Registry init uses the same Delta/UC/MinIO stack as the main Bronze job,
    # so keep the jar set aligned and avoid wildcard Ivy classpaths here too.
    spark.jars: "local:///opt/spark/ivy/jars/org.apache.hadoop_hadoop-aws-3.4.1.jar,local:///opt/spark/ivy/jars/software.amazon.awssdk_bundle-2.24.6.jar,local:///opt/spark/ivy/delta-spark_2.13-4.0.1.jar,local:///opt/spark/ivy/delta-storage-4.0.1.jar,local:///opt/spark/ivy/unitycatalog-spark_2.13-0.3.1.jar,local:///opt/spark/ivy/unitycatalog-client-0.3.1.jar"
    spark.ui.enabled: "false"
    spark.sql.extensions: "io.delta.sql.DeltaSparkSessionExtension"
    spark.sql.catalog.spark_catalog: "org.apache.spark.sql.delta.catalog.DeltaCatalog"
{% if params.uc_enabled == "true" %}
    spark.sql.catalog.{{ params.uc_catalog }}: "{{ params.uc_catalog_impl }}"
    spark.sql.catalog.{{ params.uc_catalog }}.uri: "{{ params.uc_api_uri }}"
    spark.sql.defaultCatalog: "{{ params.uc_catalog }}"
    spark.sql.catalog.{{ params.uc_catalog }}.auth.type: "{{ params.uc_auth_type }}"
    spark.sql.catalog.{{ params.uc_catalog }}.auth.token: "{{ params.uc_token }}"
{% endif %}
  volumes:
    - name: ivy-cache
      persistentVolumeClaim:
        claimName: ivy-cache
  restartPolicy:
    type: Never
  driver:
    # The driver validates that the UC registry table is already present.
    cores: {{ params.driver_cores }}
    coreRequest: "{{ params.driver_core_request }}"
    memory: "{{ params.driver_memory }}"
    serviceAccount: {{ params.service_account }}
    nodeSelector:
      kubernetes.io/hostname: ampere-k8s-node4
    volumeMounts:
      - name: ivy-cache
        mountPath: /opt/spark/ivy
  executor:
    # Executors are kept for symmetry with the SparkApplication spec, even though
    # registry validation is mostly driver-centric work.
    instances: {{ params.executor_instances }}
    cores: {{ params.executor_cores }}
    coreRequest: "{{ params.executor_core_request }}"
    memory: "{{ params.executor_memory }}"
    nodeSelector:
      kubernetes.io/hostname: ampere-k8s-node4
    volumeMounts:
      - name: ivy-cache
        mountPath: /opt/spark/ivy
